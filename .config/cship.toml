# cship — Claude Code statusline
# Full config reference: https://cship.dev
[cship]
lines = [
  "$cship.model $cship.cost $cship.context_bar $cship.usage_limits"
]

[cship.model]
symbol = "🤖 "
style  = "bold fg:#94e2d5"

[cship.context_bar]
width              = 10
style              = "fg:#89b4fa"
warn_threshold     = 40.0
warn_style         = "fg:#f9e2af"
critical_threshold = 70.0
critical_style     = "bold fg:#f38ba8"

[cship.cost]
symbol             = "💰 "
style              = "fg:#b4befe"
warn_threshold     = 2.0
warn_style         = "fg:#f9e2af"
critical_threshold = 5.0
critical_style     = "bold fg:#f38ba8"

[cship.usage_limits]
five_hour_format   = "⌛ 5h {pct}% ({reset})"
seven_day_format   = "📅 7d {pct}% ({reset})"
separator          = " "
warn_threshold     = 60.0
warn_style         = "fg:#f9e2af"
critical_threshold = 80.0
critical_style     = "bold fg:#f38ba8"
